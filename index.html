<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Nations Financial Health</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f9f9f9;
            color: #222;
        }
        h1 {
            font-size: 1.8rem;
            border-bottom: 3px solid #2c6e49;
            padding-bottom: 10px;
            color: #2c6e49;
        }
        p.subtitle {
            color: #555;
            margin-top: -10px;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        th {
            background: #2c6e49;
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-size: 0.9rem;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }
        tr:last-child td { border-bottom: none; }
        tr.clickable:hover td {
            background: #f0f7f4;
            cursor: pointer;
        }
        tr.selected td { background: #e0f0e8; }
        .score { font-weight: bold; font-size: 1.1rem; }
        .score-high { color: #2c6e49; }
        .score-mid { color: #e07b00; }
        .score-low { color: #cc2936; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 6px;
        }
        .tag-warning { background: #fff0f0; color: #cc2936; border: 1px solid #cc2936; }
        .tag-ok { background: #f0f7f4; color: #2c6e49; border: 1px solid #2c6e49; }

        /* Detail panel */
        #detail-panel {
            display: none;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 28px;
            margin-bottom: 30px;
        }
        #detail-panel h2 {
            color: #2c6e49;
            margin-top: 0;
            font-size: 1.4rem;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }
        .metric-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 14px;
            border-left: 4px solid #2c6e49;
        }
        .metric-card.warning { border-left-color: #e07b00; }
        .metric-card.danger { border-left-color: #cc2936; }
        .metric-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .metric-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #222;
        }
        .warning-box {
            background: #fff8f0;
            border: 1px solid #e07b00;
            border-radius: 6px;
            padding: 12px 16px;
            margin-top: 16px;
        }
        .warning-box h4 {
            margin: 0 0 8px 0;
            color: #e07b00;
            font-size: 0.9rem;
        }
        .warning-box ul {
            margin: 0;
            padding-left: 18px;
            font-size: 0.85rem;
            color: #555;
        }
        .warning-box ul li { margin-bottom: 4px; }
        .notes-box {
            background: #f0f7f4;
            border-radius: 6px;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #444;
        }
        .close-btn {
            float: right;
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #666;
        }
        .close-btn:hover { background: #eee; }
        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

<h1>First Nations Financial Health</h1>
<p class="subtitle">Data extracted from FNFTA disclosures. Fiscal year ending March 31, 2024. Click a nation for details.</p>

<table>
    <thead>
        <tr>
            <th>Nation</th>
            <th>Health Score</th>
            <th>ISC Dependency</th>
            <th>OSR</th>
            <th>Revenue</th>
            <th>Flags</th>
        </tr>
    </thead>
    <tbody id="table-body">
        <tr><td colspan="6">Loading...</td></tr>
    </tbody>
</table>

<div id="detail-panel"></div>

<footer>
    Data sourced from publicly available FNFTA disclosures. Analysis methodology available on GitHub.
</footer>

<script>
    const nations = [
        'data/output/bigstone_cree_nation_2024.json',
        'data/output/samson_cree_nation_2024.json',
        'data/output/peguis_first_nation_2024.json',
        'data/output/enoch_cree_nation_2024.json',
        'data/output/norway_house_cree_nation_2024.json',
        'data/output/saddle_lake_cree_nation_2024.json',
        'data/output/whitefish_lake_band_no._128_2024.json'
    ];

    let allData = [];
    let selectedRow = null;

    function scoreClass(score) {
        if (score >= 80) return 'score-high';
        if (score >= 60) return 'score-mid';
        return 'score-low';
    }

    function metricClass(score) {
        if (score >= 80) return '';
        if (score >= 60) return 'warning';
        return 'danger';
    }

    function formatCurrency(n) {
        if (!n && n !== 0) return 'N/A';
        return '$' + Math.round(n).toLocaleString('en-CA');
    }

    function formatPct(n) {
        if (!n && n !== 0) return 'N/A';
        return n.toFixed(1) + '%';
    }

    function formatRatio(n) {
        if (!n && n !== 0) return 'N/A';
        return n.toFixed(2) + 'x';
    }

    function showDetail(d) {
        const panel = document.getElementById('detail-panel');
        const warnings = d.warnings || [];
        const warningHtml = warnings.length > 0 ? `
            <div class="warning-box">
                <h4>⚠ Flags & Warnings</h4>
                <ul>${warnings.map(w => `<li>${w}</li>`).join('')}</ul>
            </div>` : '';

        const notesHtml = d.notes ? `
            <div class="notes-box"><strong>Auditor notes:</strong> ${d.notes}</div>` : '';

        panel.innerHTML = `
            <button class="close-btn" onclick="closeDetail()">✕ Close</button>
            <h2>${d.nation} — Fiscal Year ${d.fiscal_year}</h2>

            <div class="section-title">Health & Dependency</div>
            <div class="detail-grid">
                <div class="metric-card ${metricClass(d.health_score)}">
                    <div class="metric-label">Health Score</div>
                    <div class="metric-value ${scoreClass(d.health_score)}">${d.health_score} / 100</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">ISC Dependency</div>
                    <div class="metric-value">${formatPct(d.isc_dependency_pct)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Transfer Dependency</div>
                    <div class="metric-value">${formatPct(d.transfer_dependency_pct)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">OSR %</div>
                    <div class="metric-value">${formatPct(d.osr_pct)}</div>
                </div>
            </div>

            <div class="section-title">Financial Position</div>
            <div class="detail-grid">
                <div class="metric-card">
                    <div class="metric-label">Total Revenue</div>
                    <div class="metric-value">${formatCurrency(d.revenue)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Total Expenses</div>
                    <div class="metric-value">${formatCurrency(d.expenses)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Annual Surplus</div>
                    <div class="metric-value">${formatCurrency(d.annual_surplus)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Accumulated Surplus</div>
                    <div class="metric-value">${formatCurrency(d.accumulated_surplus)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Cash</div>
                    <div class="metric-value">${formatCurrency(d.cash)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Long-term Debt</div>
                    <div class="metric-value">${formatCurrency(d.long_term_debt)}</div>
                </div>
            </div>

            <div class="section-title">Ratios</div>
            <div class="detail-grid">
                <div class="metric-card">
                    <div class="metric-label">Working Capital Ratio</div>
                    <div class="metric-value">${formatRatio(d.working_capital_ratio)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Liquidity Ratio</div>
                    <div class="metric-value">${formatRatio(d.liquidity_ratio)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Debt Service Coverage</div>
                    <div class="metric-value">${formatRatio(d.debt_service_coverage)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Net Assets to Debt</div>
                    <div class="metric-value">${formatRatio(d.net_assets_to_debt)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">EBITDA Proxy</div>
                    <div class="metric-value">${formatCurrency(d.ebitda_proxy)}</div>
                </div>
            </div>

            <div class="section-title">Year-over-Year</div>
            <div class="detail-grid">
                <div class="metric-card">
                    <div class="metric-label">Revenue Growth</div>
                    <div class="metric-value">${formatPct(d.revenue_growth)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Expense Growth</div>
                    <div class="metric-value">${formatPct(d.expense_growth)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Surplus Growth</div>
                    <div class="metric-value">${formatPct(d.surplus_growth)}</div>
                </div>
            </div>

            ${warningHtml}
            ${notesHtml}
        `;

        panel.style.display = 'block';
        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeDetail() {
        document.getElementById('detail-panel').style.display = 'none';
        if (selectedRow) {
            selectedRow.classList.remove('selected');
            selectedRow = null;
        }
    }

    async function loadData() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        allData = await Promise.all(
            nations.map(path => fetch(path).then(r => r.json()))
        );

        allData.sort((a, b) => b.health_score - a.health_score);

        allData.forEach((d, i) => {
            const warnings = d.warnings || [];
            const hasGoingConcern = warnings.some(w => w.includes('Going concern'));
            const hasQualified = warnings.some(w => w.includes('Qualified'));
            const hasOneTime = warnings.some(w => w.includes('One-time'));

            const flags = [
                hasGoingConcern ? '<span class="tag tag-warning">Going Concern</span>' : '',
                hasQualified ? '<span class="tag tag-warning">Qualified Audit</span>' : '',
                hasOneTime ? '<span class="tag tag-warning">One-time Item</span>' : '',
                warnings.length === 0 ? '<span class="tag tag-ok">Clean</span>' : ''
            ].join('');

            const tr = document.createElement('tr');
            tr.className = 'clickable';
            tr.innerHTML = `
                <td><strong>${d.nation}</strong></td>
                <td><span class="score ${scoreClass(d.health_score)}">${d.health_score} / 100</span></td>
                <td>${formatPct(d.isc_dependency_pct)}</td>
                <td>${formatPct(d.osr_pct)}</td>
                <td>${formatCurrency(d.revenue)}</td>
                <td>${flags}</td>
            `;
            tr.addEventListener('click', () => {
                if (selectedRow) selectedRow.classList.remove('selected');
                selectedRow = tr;
                tr.classList.add('selected');
                showDetail(d);
            });
            tbody.appendChild(tr);
        });
    }

    loadData();
</script>

</body>
</html>
